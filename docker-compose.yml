# Local dev database: PostgreSQL 16 + PostGIS 3.4
# Usage: docker compose up -d   (requires Docker Desktop)
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: parkingboss-db
    environment:
      POSTGRES_USER: parkingboss
      POSTGRES_PASSWORD: parkingboss
      POSTGRES_DB: parkingboss
    ports:
      - "5432:5432"
    volumes:
      - parkingboss_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkingboss"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  parkingboss_pgdata:
