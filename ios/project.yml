name: ParkingBoss
options:
  bundleIdPrefix: pl.parkingboss
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: pl

targets:
  ParkingBoss:
    type: application
    platform: iOS
    sources:
      - path: ParkingBoss
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.parkingboss.app
        INFOPLIST_FILE: ParkingBoss/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
